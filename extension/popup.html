<!DOCTYPE html>
<html>
<head>
    <title>PresentMate Session</title>
    <style>
        /* Teal Green & Cream Theme */
        body { 
            width: 360px; 
            padding: 20px; 
            font-family: system-ui, -apple-system, sans-serif; 
            color: #0f172a; 
            background-color: #fdfbf7; /* Cream */
            margin: 0; 
            box-sizing: border-box;
        }
        
        .header-container { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .logo-icon { background: #0d9488; padding: 6px; border-radius: 8px; display: flex; }
        
        h3 { margin: 0; color: #0d9488; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { font-size: 12px; color: #64748b; margin-bottom: 20px; font-weight: 500; }
        
        label { font-size: 12px; font-weight: 700; display: block; margin-bottom: 6px; color: #0f172a; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input { 
            width: 100%; 
            padding: 10px 12px; 
            box-sizing: border-box; 
            border: 1px solid #ccfbf1; 
            background: #ffffff;
            border-radius: 10px; 
            font-size: 13px; 
            outline: none; 
            transition: all 0.2s;
            box-shadow: 0 2px 4px rgba(13, 148, 136, 0.05);
            font-weight: 500;
        }
        .input:focus { border-color: #14b8a6; box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15); }
        
        .btn { 
            padding: 10px 16px; 
            background: #0d9488; 
            color: white; 
            border: none; 
            cursor: pointer;
            border-radius: 10px; 
            width: 100%; 
            margin-top: 12px; 
            font-size: 14px; 
            font-weight: 700; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.2);
        }
        .btn:hover:not(:disabled) { background: #0f766e; transform: translateY(-1px); box-shadow: 0 6px 8px -1px rgba(13, 148, 136, 0.3); }
        .btn:active:not(:disabled) { transform: translateY(0); }
        
        .btn-nav { padding: 6px 10px; background: #e2e8f0; color: #334155; border: none; cursor: pointer; border-radius: 6px; font-size: 11px; font-weight: 700; transition: all 0.2s; }
        .btn-nav:hover:not(:disabled) { background: #cbd5e1; color: #0f172a; }
        .btn-nav:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-stealth { background: #475569; box-shadow: 0 2px 4px rgba(15, 23, 42, 0.1); }
        .btn-stealth:hover:not(:disabled) { background: #334155; box-shadow: 0 4px 6px rgba(15, 23, 42, 0.2); }
        .btn-stealth-active { background: #0f172a; }
        
        #status { 
            margin-top: 16px; 
            font-size: 12px; 
            text-align: center; 
            font-weight: 700;
            color: #64748b; 
            padding: 8px; 
            background: #f1f5f9; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0;
        }
        
        .divider { height: 1px; background: linear-gradient(to right, transparent, #ccfbf1, transparent); margin: 20px 0; }
        
        #pm-hints-panel { display: none; animation: fadeIn 0.3s ease-out; }
        .hints-header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .hints-header { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #0d9488; }
        
        #pm-hints-content { 
            font-size: 13px; 
            background: #ffffff; 
            border-radius: 12px;
            padding: 16px; 
            border: 1px solid #ccfbf1; 
            max-height: 280px;
            overflow-y: auto; 
            line-height: 1.6;
            box-shadow: inset 0 2px 4px rgba(13, 148, 136, 0.02);
            font-weight: 500;
        }
        
        .stealth-note { font-size: 11px; color: #64748b; margin: 8px 0 0; text-align: center; font-weight: 500; line-height: 1.4; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="logo-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/></svg>
        </div>
        <h3>PresentMate</h3>
    </div>
    <p class="subtitle">AI presentation assistant.</p>

    <label for="sessionId">Session ID</label>
    <input type="text" id="sessionId" class="input" placeholder="e.g. 64b8f3a..." autocomplete="off" spellcheck="false"/>
    <button class="btn" id="connectBtn">Connect Session</button>

    <div id="status">Status: Waiting</div>

    <div class="divider"></div>

    <button class="btn btn-stealth" id="stealthBtn">Enable Presentation Mode</button>
    <p class="stealth-note">Hides the page overlay — you read hints here; projector only sees a status badge.</p>

    <div id="pm-hints-panel">
        <div class="divider"></div>
        <div class="hints-header-container">
            <button class="btn-nav" id="pop-prev-btn" disabled>Prev</button>
            <div class="hints-header" id="pop-slide-text">Slide 1</div>
            <button class="btn-nav" id="pop-next-btn" disabled>Next</button>
        </div>
        <div id="pm-hints-content">Loading...</div>
    </div>

    <script src="dist/popup.js"></script>
</body>
</html>
